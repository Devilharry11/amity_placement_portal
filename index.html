<!DOCTYPE html>
<html>
<head>
<title>Placement Intelligence System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:linear-gradient(-45deg,#1e3c72,#2a5298,#4caf50,#0f2027);
background-size:400% 400%;
animation:gradient 12s ease infinite;
color:#222;
transition:0.4s;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.dark{
background:#0f0f0f;
color:white;
}

header{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
animation:fadeDown 1s ease;
}

@keyframes fadeDown{
from{opacity:0;transform:translateY(-40px);}
to{opacity:1;transform:translateY(0);}
}

.hero{
text-align:center;
padding:40px;
color:white;
animation:fadeUp 1.2s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.filters{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);
padding:25px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-bottom:30px;
animation:fadeUp 1.5s ease;
}

.filters input,.filters select{
padding:8px;
border-radius:10px;
border:none;
}

.filters button{
grid-column:span 2;
padding:10px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
background:black;
color:white;
transition:0.3s;
}

.filters button:hover{
transform:scale(1.05);
}

.company-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
transition:0.3s;
transform:translateY(30px);
opacity:0;
animation:cardFade 0.6s forwards;
}

@keyframes cardFade{
to{transform:translateY(0);opacity:1;}
}

.card:hover{
transform:translateY(-8px) scale(1.03);
box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

.badge{
display:inline-block;
padding:4px 10px;
border-radius:8px;
font-size:12px;
color:white;
margin-right:5px;
}

.super{background:#e91e63;}
.dream{background:#ff9800;}
.mass{background:#2a9df4;}

.match{
margin-top:10px;
font-weight:600;
color:#1e3c72;
}

footer{
margin-top:60px;
background:#000;
color:white;
text-align:center;
padding:25px;
}

.dark .card{background:#1e1e1e;color:white;}
.dark .filters{background:rgba(0,0,0,0.5);}
.dark footer{background:#111;}
</style>
</head>

<body>

<header>
<h2>Placement Intelligence System</h2>
<button onclick="toggleDark()">🌙</button>
</header>

<div class="hero">
<h1>Smart Placement Engine 🚀</h1>
<p>Analyze • Filter • Dominate Placements</p>
</div>

<div class="container">

<div class="filters">

<input type="number" id="cgpa" placeholder="CGPA">

<select id="backlog">
<option value="no">No Backlog</option>
<option value="yes">Backlog</option>
</select>

<select id="branch">
<option value="All">Branch</option>
<option value="CSE">CSE</option>
<option value="IT">IT</option>
<option value="ECE">ECE</option>
</select>

<select id="spec">
<option value="All">Specialization</option>
<option value="AIML">AIML</option>
<option value="Cyber">Cyber</option>
<option value="Data">Data</option>
<option value="Robotics">Robotics</option>
</select>

<select id="skill">
<option value="All">Skill</option>
<option value="Java">Java</option>
<option value="Python">Python</option>
<option value="DSA">DSA</option>
<option value="SQL">SQL</option>
<option value="Cloud">Cloud</option>
<option value="Cyber">Cyber</option>
</select>

<select id="type">
<option value="All">Company Type</option>
<option value="mass">Mass</option>
<option value="dream">Dream</option>
<option value="super">Super</option>
</select>

<select id="package">
<option value="0">Package</option>
<option value="5">5+</option>
<option value="10">10+</option>
<option value="20">20+</option>
</select>

<input type="text" id="search" placeholder="Search Company">

<select id="sort">
<option value="none">Sort</option>
<option value="package">Package High → Low</option>
<option value="cgpa">CGPA Low → High</option>
</select>

<button onclick="filterCompanies()">Apply Filters</button>

</div>

<div class="company-grid" id="companyList"></div>

</div>

<footer>
<p><strong>Creator:</strong> Haridutt Sharma</p>
<p>B.Tech CSE | Semester 4</p>
<p>Amity University Madhya Pradesh</p>
</footer>

<script>

const companies=[
{name:"Amazon",cgpa:7.5,backlog:false,branch:["CSE","IT"],spec:["AIML","Data"],skills:["Java","DSA","Cloud"],package:34,type:"super"},
{name:"Palo Alto",cgpa:8,backlog:false,branch:["CSE"],spec:["Cyber"],skills:["Cyber","Python"],package:22,type:"super"},
{name:"Capgemini",cgpa:6.5,backlog:true,branch:["All"],spec:["All"],skills:["Java","SQL"],package:5,type:"dream"},
{name:"Accenture",cgpa:6,backlog:true,branch:["All"],spec:["All"],skills:["Java","Python"],package:6,type:"mass"},
{name:"Samsung",cgpa:7.5,backlog:false,branch:["CSE","ECE"],spec:["Robotics","AIML"],skills:["C++","DSA"],package:18,type:"dream"}
];

function render(list){
let html="";
list.forEach((c,i)=>{
html+=`
<div class="card" style="animation-delay:${i*0.1}s">
<h3>${c.name}</h3>
<span class="badge ${c.type}">${c.type.toUpperCase()}</span>
<p>Min CGPA: ${c.cgpa}</p>
<p>Package: ₹${c.package} LPA</p>
<p>Skills: ${c.skills.join(", ")}</p>
<div class="match">${calculateMatch(c)}% Match</div>
</div>`;
});
document.getElementById("companyList").innerHTML=html;
}

function calculateMatch(c){
let score=0;
let userCGPA=parseFloat(document.getElementById("cgpa").value)||0;
let userSkill=document.getElementById("skill").value;

if(userCGPA>=c.cgpa) score+=40;
if(userSkill!="All" && c.skills.includes(userSkill)) score+=30;
if(userCGPA>=c.cgpa+1) score+=30;

return score;
}

function filterCompanies(){
let cgpa=parseFloat(document.getElementById("cgpa").value)||0;
let backlog=document.getElementById("backlog").value;
let branch=document.getElementById("branch").value;
let spec=document.getElementById("spec").value;
let skill=document.getElementById("skill").value;
let type=document.getElementById("type").value;
let pkg=parseFloat(document.getElementById("package").value);
let search=document.getElementById("search").value.toLowerCase();
let sort=document.getElementById("sort").value;

let filtered=companies.filter(c=>
cgpa>=c.cgpa &&
((backlog=="no" && !c.backlog)||(backlog=="yes")) &&
(c.branch.includes(branch)||branch=="All"||c.branch.includes("All")) &&
(c.spec.includes(spec)||spec=="All"||c.spec.includes("All")) &&
(c.skills.includes(skill)||skill=="All") &&
c.package>=pkg &&
(c.type==type||type=="All") &&
c.name.toLowerCase().includes(search)
);

if(sort=="package"){filtered.sort((a,b)=>b.package-a.package);}
if(sort=="cgpa"){filtered.sort((a,b)=>a.cgpa-b.cgpa);}

render(filtered);
}

render(companies);

function toggleDark(){
document.body.classList.toggle("dark");
}

</script>

</body>
</html>
