<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amity Angel – Placement Intelligence OS</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#0f1117;
color:#e6edf3;
}

header{
background:#161b22;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #30363d;
}

header h1{
margin:0;
font-size:18px;
color:#58a6ff;
}

button{
cursor:pointer;
border:none;
padding:8px 14px;
border-radius:6px;
font-weight:600;
background:#21262d;
color:#e6edf3;
}

button.primary{background:#238636;}

.container{
padding:25px;
max-width:1200px;
margin:auto;
}

.card{
background:#161b22;
padding:18px;
border-radius:8px;
margin-bottom:20px;
border:1px solid #30363d;
}

input{
width:100%;
padding:8px;
margin:6px 0;
border-radius:6px;
border:1px solid #30363d;
background:#0d1117;
color:#e6edf3;
}

.hidden{display:none;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.metric{
background:#161b22;
padding:15px;
border-radius:8px;
border:1px solid #30363d;
}

.metric h3{
margin:0;
font-size:13px;
color:#58a6ff;
}

.metric p{
font-size:18px;
margin:5px 0 0 0;
}

.table{
width:100%;
border-collapse:collapse;
}

.table th,.table td{
border:1px solid #30363d;
padding:8px;
font-size:13px;
}

/* AI Panel */
#aiToggle{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
background:#58a6ff;
color:white;
font-size:22px;
}

#aiPanel{
position:fixed;
bottom:90px;
right:20px;
width:340px;
height:480px;
background:#161b22;
border:1px solid #30363d;
border-radius:10px;
display:none;
flex-direction:column;
}

#chatArea{
flex:1;
overflow-y:auto;
padding:10px;
font-size:13px;
}

footer{
text-align:center;
padding:20px;
border-top:1px solid #30363d;
margin-top:30px;
font-size:12px;
color:#8b949e;
}
</style>
</head>

<body>

<header>
<h1>Amity Angel – Placement Intelligence OS</h1>
<div>
<button onclick="login('student')">Student</button>
<button onclick="login('faculty')">Faculty</button>
</div>
</header>

<!-- AI BUTTON -->
<button id="aiToggle">🤖</button>

<!-- AI PANEL -->
<div id="aiPanel">
<div style="padding:10px;border-bottom:1px solid #30363d;">
<strong>Amity Angel Assistant</strong>
</div>
<div id="chatArea"></div>
<div style="padding:10px;border-top:1px solid #30363d;">
<input type="text" id="aiInput" placeholder="Ask about placement..." style="width:70%;">
<button onclick="sendMessage()">Send</button>
</div>
</div>

<div class="container">

<!-- STUDENT -->
<div id="studentDashboard" class="hidden">

<div class="card">
<h2>Student Profile</h2>
<input type="number" id="cgpa" placeholder="CGPA">
<input type="number" id="backlogs" placeholder="Backlogs">
<input type="text" id="skills" placeholder="Skills (comma separated)">
<input type="number" id="projects" placeholder="Projects">
<input type="number" id="certificates" placeholder="Certificates">
<button class="primary" onclick="analyzeStudent()">Analyze</button>
</div>

<div id="studentReport" class="hidden">
<div class="grid">
<div class="metric"><h3>Readiness</h3><p id="readinessScore"></p></div>
<div class="metric"><h3>Risk</h3><p id="riskLevel"></p></div>
<div class="metric"><h3>Mass</h3><p id="massProb"></p></div>
<div class="metric"><h3>Dream</h3><p id="dreamProb"></p></div>
</div>

<div class="card">
<h3>Company Match</h3>
<table class="table">
<thead>
<tr><th>Company</th><th>Type</th><th>Match %</th></tr>
</thead>
<tbody id="companyMatchTable"></tbody>
</table>
</div>
</div>
</div>

<!-- FACULTY -->
<div id="facultyDashboard" class="hidden">

<div class="card">
<h3>Batch Overview</h3>
<div class="grid">
<div class="metric"><h3>Total</h3><p id="totalStudents"></p></div>
<div class="metric"><h3>Avg CGPA</h3><p id="avgCGPA"></p></div>
</div>
</div>

<div class="card">
<canvas id="cgpaChart"></canvas>
</div>

</div>

</div>

<footer>
Designer: Haridutt Sharma | B.Tech CSE | Amity University Madhya Pradesh
</footer>

<script>

const students=[
{name:"A",cgpa:8.2},
{name:"B",cgpa:6.5},
{name:"C",cgpa:7.8},
{name:"D",cgpa:5.9},
{name:"E",cgpa:9.1}
];

const companies=[
{name:"Amazon",type:"Super",min:8},
{name:"Infosys",type:"Mass",min:6},
{name:"Palo Alto",type:"Dream",min:7.5}
];

function login(role){
document.getElementById("studentDashboard").classList.add("hidden");
document.getElementById("facultyDashboard").classList.add("hidden");

if(role==="student"){
document.getElementById("studentDashboard").classList.remove("hidden");
}

if(role==="faculty"){
document.getElementById("facultyDashboard").classList.remove("hidden");
loadFaculty();
}
}

function analyzeStudent(){
let cgpa=parseFloat(document.getElementById("cgpa").value)||0;
let back=parseInt(document.getElementById("backlogs").value)||0;

let readiness=Math.max(0,Math.min(100,(cgpa*10)-(back*8)));
let risk=cgpa>=8?"Low":"Moderate";

document.getElementById("readinessScore").innerText=readiness+"%";
document.getElementById("riskLevel").innerText=risk;
document.getElementById("massProb").innerText=(readiness+10)+"%";
document.getElementById("dreamProb").innerText=(readiness-10)+"%";

let table="";
companies.forEach(c=>{
let match=cgpa>=c.min?readiness:readiness-20;
table+=`<tr><td>${c.name}</td><td>${c.type}</td><td>${match}%</td></tr>`;
});
document.getElementById("companyMatchTable").innerHTML=table;

document.getElementById("studentReport").classList.remove("hidden");
}

function loadFaculty(){
document.getElementById("totalStudents").innerText=students.length;
let avg=(students.reduce((a,b)=>a+b.cgpa,0)/students.length).toFixed(2);
document.getElementById("avgCGPA").innerText=avg;

new Chart(document.getElementById("cgpaChart"),{
type:'bar',
data:{
labels:students.map(s=>s.name),
datasets:[{
label:"CGPA",
data:students.map(s=>s.cgpa),
backgroundColor:"#58a6ff"
}]
}
});
}

/* AI SYSTEM */
document.getElementById("aiToggle").onclick=function(){
let panel=document.getElementById("aiPanel");
panel.style.display=panel.style.display==="flex"?"none":"flex";
panel.style.display="flex";
};

function sendMessage(){
let input=document.getElementById("aiInput");
let msg=input.value.trim();
if(!msg) return;

let chat=document.getElementById("chatArea");
chat.innerHTML+=`<div style="color:#58a6ff;">You: ${msg}</div>`;

let reply="Ask about CGPA, skills, dream companies or resume.";

if(msg.includes("cgpa")){
reply="Maintain 7.5+ for Dream and 8+ for Super Dream companies.";
}
if(msg.includes("dream")){
reply="Dream companies require strong DSA + 7.5+ CGPA.";
}

chat.innerHTML+=`<div>Angel: ${reply}</div><br>`;
chat.scrollTop=chat.scrollHeight;
input.value="";
}

</script>
</body>
</html>
