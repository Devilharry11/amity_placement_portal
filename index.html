<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amity Angel 3.0 – Placement Intelligence OS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{background:#f4f6f9;color:#111;}
.hidden{display:none;}

header{
position:fixed;
top:0;width:100%;
background:#ffffff;
border-bottom:1px solid #e6e6e6;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
}

header h1{font-size:18px;font-weight:600;}

.main{display:flex;margin-top:70px;min-height:100vh;}

.sidebar{
width:240px;
background:#0f172a;
color:white;
padding:20px;
display:flex;
flex-direction:column;
}

.sidebar button{
background:none;border:none;color:white;
text-align:left;padding:12px;
margin-bottom:8px;cursor:pointer;
border-radius:6px;font-size:14px;
}

.sidebar button:hover{background:#1e293b;}

.content{flex:1;padding:40px;}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
margin-bottom:20px;
}

input,select{
width:100%;padding:10px;margin:8px 0;
border-radius:8px;border:1px solid #ddd;font-size:14px;
}

button.primary{
background:#2563eb;color:white;border:none;
padding:10px 16px;border-radius:8px;
cursor:pointer;font-weight:500;
}

.chat-box{
border:1px solid #ddd;
height:300px;
overflow-y:auto;
padding:10px;
margin-bottom:10px;
background:#f9fafb;
}

.chat-msg{margin-bottom:10px;font-size:14px;}

footer{
text-align:center;padding:25px;
border-top:1px solid #e6e6e6;
font-size:13px;color:#666;
}
</style>
</head>

<body>

<header>
<h1>Amity Angel 3.0 – Placement Intelligence OS</h1>
<div id="logoutBtn" class="hidden">
<button class="primary" onclick="logout()">Logout</button>
</div>
</header>

<!-- LOGIN -->
<div id="loginPage" style="margin-top:120px;text-align:center;">
<h2>Secure University Access</h2>
<div style="max-width:350px;margin:30px auto;">
<select id="role">
<option value="student">Student</option>
<option value="faculty">Faculty</option>
</select>

<input type="text" id="loginID" placeholder="Enrollment ID / Faculty Email">
<input type="password" id="password" placeholder="Password">
<button class="primary" onclick="login()">Login</button>
<p id="loginError" style="color:red;margin-top:10px;"></p>
</div>
</div>

<!-- SYSTEM -->
<div id="system" class="hidden main">
<div class="sidebar" id="sidebar"></div>
<div class="content">
<div id="dashboard"></div>
</div>
</div>

<footer>
Amity Angel 3.0 Demo Build | AI + Analytics + Mock + Explorer
</footer>

<script>

/* ===== DEMO DATABASE ===== */

const students=[
{id:"AUMP24CSE001",password:"1234",name:"Rahul",branch:"CSE",cgpa:8.2},
{id:"AUMP24IT002",password:"1234",name:"Aman",branch:"IT",cgpa:7.1}
];

const faculty=[
{email:"tpo@amity.edu",password:"admin123"}
];

const companies=[
{name:"Amazon",min:8,type:"Super Dream",package:34},
{name:"Microsoft",min:8.5,type:"Super Dream",package:40},
{name:"TCS",min:6,type:"Mass",package:4}
];

/* ===== LOGIN ===== */

function login(){
let role=document.getElementById("role").value;
let id=document.getElementById("loginID").value.trim();
let pass=document.getElementById("password").value.trim();

if(role==="student"){
let user=students.find(s=>s.id===id && s.password===pass);
if(user){initSystem("student",user);}
else{document.getElementById("loginError").innerText="Invalid Student";}
}

if(role==="faculty"){
let user=faculty.find(f=>f.email===id && f.password===pass);
if(user){initSystem("faculty",user);}
else{document.getElementById("loginError").innerText="Invalid Faculty";}
}
}

function logout(){location.reload();}

function initSystem(role,user){
document.getElementById("loginPage").classList.add("hidden");
document.getElementById("system").classList.remove("hidden");
document.getElementById("logoutBtn").classList.remove("hidden");
loadSidebar(role,user);
loadHome(role,user);
}

/* ===== SIDEBAR ===== */

function loadSidebar(role,user){
let sidebar=document.getElementById("sidebar");

if(role==="student"){
sidebar.innerHTML=`
<button onclick="loadHome('student')">Dashboard</button>
<button onclick="loadAnalyzer()">Profile Analyzer</button>
<button onclick="loadCompanies()">Company Explorer</button>
<button onclick="loadMock()">Mock Test</button>
<button onclick="loadAI()">AI Assistant</button>
`;
}

if(role==="faculty"){
sidebar.innerHTML=`
<button onclick="loadFaculty()">Batch Analytics</button>
<button onclick="loadAI()">AI Assistant</button>
`;
}
}

/* ===== STUDENT DASHBOARD ===== */

function loadHome(role,user){
document.getElementById("dashboard").innerHTML=`
<div class="card">
<h2>Welcome ${user.name}</h2>
<p>Branch: ${user.branch}</p>
<p>Current CGPA: ${user.cgpa}</p>
</div>
`;
}

/* ===== PROFILE ANALYZER ===== */

function loadAnalyzer(){
document.getElementById("dashboard").innerHTML=`
<div class="card">
<h2>Profile Analyzer</h2>
<input type="number" id="cgpaInput" placeholder="CGPA">
<input type="number" id="projectsInput" placeholder="Projects">
<input type="number" id="certInput" placeholder="Certifications">
<button class="primary" onclick="analyze()">Analyze</button>
<div id="result"></div>
</div>
`;
}

function analyze(){
let cgpa=parseFloat(document.getElementById("cgpaInput").value)||0;
let score=Math.min(100,cgpa*10);
document.getElementById("result").innerHTML=`<p>Readiness Score: ${score}%</p>`;
}

/* ===== COMPANY EXPLORER ===== */

function loadCompanies(){
let html=`<div class="card"><h2>Company Explorer</h2>`;
companies.forEach(c=>{
html+=`<p><b>${c.name}</b> | Min CGPA: ${c.min} | Package: ₹${c.package} LPA</p>`;
});
html+=`</div>`;
document.getElementById("dashboard").innerHTML=html;
}

/* ===== MOCK TEST ===== */

function loadMock(){
document.getElementById("dashboard").innerHTML=`
<div class="card">
<h2>Mock Test</h2>
<p>Q1: Time complexity of Binary Search?</p>
<select id="ans">
<option>O(n)</option>
<option>O(log n)</option>
<option>O(n^2)</option>
</select>
<button class="primary" onclick="checkMock()">Submit</button>
<div id="mockResult"></div>
</div>
`;
}

function checkMock(){
let ans=document.getElementById("ans").value;
if(ans==="O(log n)"){
document.getElementById("mockResult").innerHTML="<p style='color:green;'>Correct</p>";
}else{
document.getElementById("mockResult").innerHTML="<p style='color:red;'>Wrong</p>";
}
}

/* ===== AI ASSISTANT (DEMO) ===== */

function loadAI(){
document.getElementById("dashboard").innerHTML=`
<div class="card">
<h2>Amity Angel AI Assistant</h2>
<div class="chat-box" id="chat"></div>
<input type="text" id="userInput" placeholder="Ask placement question...">
<button class="primary" onclick="sendMsg()">Send</button>
</div>
`;
}

function sendMsg(){
let input=document.getElementById("userInput").value;
let chat=document.getElementById("chat");
chat.innerHTML+=`<div class="chat-msg"><b>You:</b> ${input}</div>`;

let reply="Focus on DSA, aptitude and core subjects.";
if(input.toLowerCase().includes("cgpa")){
reply="Maintain CGPA above 7.5 for good companies.";
}
chat.innerHTML+=`<div class="chat-msg"><b>AI:</b> ${reply}</div>`;
document.getElementById("userInput").value="";
}

/* ===== FACULTY PANEL ===== */

function loadFaculty(){
let avg=(students.reduce((a,b)=>a+b.cgpa,0)/students.length).toFixed(2);
document.getElementById("dashboard").innerHTML=`
<div class="card">
<h2>Batch Analytics</h2>
<p>Total Students: ${students.length}</p>
<p>Average CGPA: ${avg}</p>
</div>
`;
}

</script>

</body>
</html>
