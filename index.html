<!DOCTYPE html>
<html>
<head>
<title>Amity Placement Smart Portal</title>

<style>

body{
    font-family: 'Segoe UI', sans-serif;
    margin:0;
    padding:40px;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

h1{
    text-align:center;
    color:white;
}

.container{
    background:white;
    padding:30px;
    border-radius:15px;
    width:85%;
    margin:auto;
    box-shadow:0 15px 30px rgba(0,0,0,0.3);
}

/* GRID FIX */
.form-grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:15px;
}

label{
    font-weight:bold;
}

input,select{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    margin-top:20px;
    padding:12px;
    background:#667eea;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
    width:100%;
}

button:hover{
    background:#5a67d8;
    transform:scale(1.03);
}

.result{
    margin-top:25px;
    display:flex;
    flex-wrap:wrap;
    gap:15px;
}

.card{
    padding:15px;
    border-radius:10px;
    min-width:200px;
    font-weight:bold;
    animation:fadeIn 0.6s ease forwards;
    color:white;
}

.green{background:#2ecc71;}
.orange{background:#f39c12;}
.red{background:#e74c3c;}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}

/* Responsive for phone */
@media(max-width:768px){
    .form-grid{
        grid-template-columns: 1fr;
    }
}

</style>
</head>

<body>

<h1>Amity University Placement Smart Portal</h1>

<div class="container">

<div class="form-grid">

<div>
<label>CGPA</label>
<input type="number" id="cgpa" step="0.1">
</div>

<div>
<label>Percentage</label>
<input type="number" id="percentage">
</div>

<div>
<label>Active Backlog</label>
<select id="backlog">
<option value="no">No</option>
<option value="yes">Yes</option>
</select>
</div>

<div>
<label>Branch</label>
<select id="branch">
<option value="CS">CS</option>
<option value="IT">IT</option>
<option value="ECE">ECE</option>
<option value="Core">Core</option>
<option value="All">All</option>
</select>
</div>

<div>
<label>Minimum Package (LPA)</label>
<input type="number" id="package" value="1">
</div>

</div>

<button onclick="filterCompanies()">Check Eligibility</button>

<div class="result" id="result"></div>

</div>

<script>

let companies = [
{name:"Amazon",cgpa:7,percent:70,backlog:"no",branch:"CS",package:25},
{name:"Commvault",cgpa:7.5,percent:70,backlog:"no",branch:"CS",package:34},
{name:"Samsung R&D",cgpa:7,percent:65,backlog:"no",branch:"CS",package:12},
{name:"Accenture",cgpa:6,percent:60,backlog:"no",branch:"All",package:4.5},
{name:"TCS",cgpa:6,percent:60,backlog:"no",branch:"All",package:4},
{name:"Infosys",cgpa:6,percent:60,backlog:"no",branch:"All",package:3.6},
{name:"Flipkart",cgpa:7,percent:65,backlog:"no",branch:"CS",package:15}
];

function filterCompanies(){

let cgpa=parseFloat(document.getElementById("cgpa").value);
let percent=parseFloat(document.getElementById("percentage").value);
let backlog=document.getElementById("backlog").value;
let branch=document.getElementById("branch").value;
let minPackage=parseFloat(document.getElementById("package").value);

let result=document.getElementById("result");
result.innerHTML="";

for(let i=0;i<companies.length;i++){

let campusEligible=
cgpa>=companies[i].cgpa &&
percent>=companies[i].percent &&
backlog==="no" &&
(branch===companies[i].branch || companies[i].branch==="All" || branch==="All") &&
companies[i].package>=minPackage;

let offCampusEligible=
cgpa>=companies[i].cgpa-0.5 &&
companies[i].package>=minPackage;

let card=document.createElement("div");
card.classList.add("card");

if(campusEligible){
card.classList.add("green");
card.innerHTML=companies[i].name+" ("+companies[i].package+" LPA) - Campus Eligible";
}
else if(offCampusEligible){
card.classList.add("orange");
card.innerHTML=companies[i].name+" - Try Off-Campus";
}
else{
card.classList.add("red");
card.innerHTML=companies[i].name+" - Not Eligible";
}

result.appendChild(card);

}

}

</script>

</body>
</html>
